version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=4000

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=https://buyora-backend-iicc.onrender.com
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      args:
        - VITE_BACKEND_URL=https://buyora-backend-iicc.onrender.com
    ports:
      - "5174:80"
    depends_on:
      - backend
