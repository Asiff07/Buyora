version: '3.8'

services:
  backend:
    build: ./backend
    expose:
      - "4000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=4000

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=
        - VITE_RAZORPAY_KEY_ID=rzp_test_Ra4DEdoFjth0VN
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      args:
        - VITE_BACKEND_URL=
    ports:
      - "5174:80"
    depends_on:
      - backend
